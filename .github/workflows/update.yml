name: Update News Data

on:
  schedule:
    # 1時間ごと(毎時7分)。GitHub Actionsの公式ドキュメントによれば、毎時ちょうど(0分)は
    # 世界中のワークフローのcronが集中して混雑し、実行開始が数十分〜数時間規模で遅延
    # することがあるとされている。2026-07-07: 実際に「毎時0分」設定のまま、パイプライン
    # 自体は15分程度で終わるようになった後も、run同士の開始時刻の間隔が3時間以上空く
    # ケースが観測されたため、混雑を避けるために毎時7分にずらした。
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (main)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # geocode_cache.json は「前回までに調べた地名の座標」を再利用するためのキャッシュ。
      # mainブランチには保存しない(自動コミットで履歴が汚れるのを避けるため)ので、
      # 直近でgh-pagesに公開したキャッシュを取ってきて再利用する。無ければ空から始める。
      - name: Restore geocode cache from gh-pages
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:geocode_cache.json > geocode_cache.json 2>/dev/null || echo "{}" > geocode_cache.json

      # news_data.json も同様にgh-pagesから前回公開分を復元する。これが無いと
      # 「蓄積方式」が機能せず、mainブランチのサンプルデータを毎回読むだけになり、
      # 実際に集まった記事が毎時リセットされてしまう(実際に起きていたバグ)。
      - name: Restore previous news_data.json from gh-pages
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:news_data.json > news_data.json 2>/dev/null || true

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 pipeline.py

      - name: Prepare publish folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp info.html _site/
          cp news_data.json _site/
          cp geocode_cache.json _site/
          # 2026-07-09: gh-pagesはforce_orphanで毎回作り直されるため、GitHubが
          # カスタムドメイン用に管理しているCNAMEファイルもここに含めないと
          # 毎時デプロイのたびにカスタムドメイン設定が失われてしまう。
          if [ -f CNAME ]; then cp CNAME _site/; fi

      # gh-pagesブランチに「毎回1コミットだけ」で公開する(force_orphan)。
      # これによりmainのコミット履歴は一切自動更新で汚れない。
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
